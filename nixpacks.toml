# Railway build (nixpacks). Pin Python and the start command explicitly so the
# build does not depend on autodetection.
# NOTE: the active builder is now the Dockerfile (see railway.json) so this file
# is unused. LibreOffice for the server-side calc engine is installed via the
# Dockerfile. Kept for reference / in case the builder is switched back.
[phases.setup]
nixPkgs = ["python312", "gcc"]

[phases.install]
cmds = ["python -m venv /opt/venv", ". /opt/venv/bin/activate && pip install --upgrade pip && pip install -r requirements.txt"]

[start]
cmd = "gunicorn web.app:app --workers 1 --threads 8 --timeout 300 --bind 0.0.0.0:$PORT"
