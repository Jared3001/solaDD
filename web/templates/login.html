<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SoLa DD — Sign in</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;800&family=Source+Serif+4:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="login-body">
  <main class="login-card">
    <p class="kicker">SoLa Impact</p>
    <h1>Site DD Feasibility</h1>
    <p class="sub">Acquisition due-diligence automation</p>
    {% if error %}<p class="error-banner">{{ error }}</p>{% endif %}
    <form method="post" action="{{ url_for('do_login') }}{% if request.args.get('next') %}?next={{ request.args.get('next') }}{% endif %}">
      <label for="password">Team password</label>
      <input type="password" id="password" name="password" autocomplete="current-password" autofocus required>
      <button type="submit">Sign in</button>
    </form>
  </main>
</body>
</html>
